name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag_check.outputs.release_tag }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: tag_check
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(rc[0-9]+)?$ ]]; then
            echo "Tag ${tag} does not match vX.Y.Z or vX.Y.ZrcN" >&2
            exit 1
          fi
          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hatch
        run: python -m pip install --upgrade pip hatch

      - name: Build distributions
        run: hatch build

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.release_tag != ''
    environment:
      name: pypi
      url: https://pypi.org/p/pxgrid-util
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
